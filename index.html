<script>
  const LINK = 'https://gpay.app.goo.gl/invite-Ka5Zq';
  const MSG  = encodeURIComponent('Earn ₹21 free on your first Google Pay payment! Use my referral link: ' + LINK);

  // Smart redirect: tries GPay app first, falls back to browser
  function smartRedirect() {
    var isAndroid = /android/i.test(navigator.userAgent);
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    if (isAndroid) {
      // Try opening GPay app directly via intent
      var appIntent = 'intent://gpay.app.goo.gl/invite-Ka5Zq#Intent;scheme=https;package=com.google.android.apps.nbu.paisa.user;end';
      var fallbackTimer = setTimeout(function() {
        // App not installed — redirect to Play Store
        window.location.href = 'https://play.google.com/store/apps/details?id=com.google.android.apps.nbu.paisa.user&referrer=utm_source=referral';
      }, 1800);
      window.location.href = appIntent;
      window.addEventListener('blur', function() { clearTimeout(fallbackTimer); });
    } else if (isIOS) {
      // Try opening GPay app on iOS
      var fallbackTimerIOS = setTimeout(function() {
        // App not installed — redirect to App Store
        window.location.href = 'https://apps.apple.com/in/app/google-pay-save-pay/id1193357041';
      }, 1800);
      window.location.href = 'gpay://';
      window.addEventListener('blur', function() { clearTimeout(fallbackTimerIOS); });
    } else {
      // Desktop — open referral link in browser
      window.open(LINK, '_blank');
    }
  }

  // Auto-trigger redirect only when user clicks the main CTA button
  // Removed auto-redirect as it was causing blank page issue

  function copyLink() {
    navigator.clipboard.writeText(LINK).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = '<i class="ti ti-check" style="font-size:15px;"></i> Copied!';
      showToast('Referral link copied!');
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="ti ti-copy" style="font-size:15px;"></i> Copy link';
      }, 2500);
    });
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function shareWhatsApp() {
    window.open('https://api.whatsapp.com/send?text=' + MSG, '_blank');
  }
  function shareTelegram() {
    window.open('https://t.me/share/url?url=' + encodeURIComponent(LINK) + '&text=' + encodeURIComponent('Earn ₹21 free on your first Google Pay payment!'), '_blank');
  }
  function shareTwitter() {
    window.open('https://twitter.com/intent/tweet?text=' + MSG, '_blank');
  }
</script>
